# =============================================================================
# docker-compose.prod.yml — Production deployment for the Agentic RAG SaaS Platform
# =============================================================================
#
# Usage:
#   1. Copy .env.example to .env and add your API keys + production settings
#   2. Run:  docker compose -f docker-compose.prod.yml up -d --build
#   3. Open: http://your-domain (Nginx on port 80)
#
# Architecture:
#   User → Nginx (reverse proxy) → Backend (Gunicorn + Uvicorn workers)
#                                 → Frontend (Next.js standalone)
#                                 → Redis (caching + task queue)
#                                 → SQLite/PostgreSQL (user data)
# =============================================================================

services:
  # --- Nginx reverse proxy --------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- FastAPI backend (Gunicorn + Uvicorn workers) -------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/rag_saas.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - rag-data:/app/faiss_index
      - db-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  # --- Next.js frontend -----------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis (caching, rate limiting, task queue) ---------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- RQ Worker (background task processing) -------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m rq.cli worker --url redis://redis:6379/0
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/rag_saas.db}
    volumes:
      - rag-data:/app/faiss_index
      - db-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  rag-data:
  redis-data:
  db-data:
